syntax = "proto3";

package ft12.v1;

import "google/protobuf/timestamp.proto";
import "proto/ft12/v1/common.proto";

option go_package = "github.com/dimbo1324/ttron-ttr20-time-r/internal/api/grpc/ft12/v1;ft12v1";

message FaultMode {
  int64 response_delay_ms = 1;
  bool corrupt_checksum = 2;
  double corrupt_checksum_probability = 3;
  bool fragment_response = 4;
  double fragment_probability = 5;
  int64 fragment_delay_ms = 6;
  bool no_response = 7;
  bool close_after_request = 8;
}

message EmulatorStatus {
  ServiceState state = 1;
  string listen_addr = 2;
  ChecksumMode checksum_mode = 3;
  uint32 active_connections = 4;
  uint64 total_connections = 5;
  uint64 total_requests = 6;
  uint64 total_responses = 7;
  uint64 protocol_errors = 8;
  string last_error = 9;
  google.protobuf.Timestamp last_request_time = 10;
  google.protobuf.Timestamp last_response_time = 11;
  FaultMode fault_mode = 12;
  uint32 recent_frames_count = 13;
}

message GetEmulatorStatusRequest {}

message GetEmulatorStatusResponse {
  EmulatorStatus status = 1;
}

message GetFaultModeRequest {}

message GetFaultModeResponse {
  FaultMode fault_mode = 1;
}

message SetFaultModeRequest {
  FaultMode fault_mode = 1;
}

message SetFaultModeResponse {
  FaultMode fault_mode = 1;
  EmulatorStatus status = 2;
}

service EmulatorService {
  rpc GetStatus(GetEmulatorStatusRequest) returns (GetEmulatorStatusResponse);
  rpc GetFaultMode(GetFaultModeRequest) returns (GetFaultModeResponse);
  rpc SetFaultMode(SetFaultModeRequest) returns (SetFaultModeResponse);
  rpc GetRecentEvents(GetRecentEventsRequest) returns (GetRecentEventsResponse);
}
